<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GBWC Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f0f1a;color:#e0e0f0;min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── Auth ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f0f1a}
.auth-box{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.5)}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.auth-logo img{width:40px;height:40px}
.auth-logo span{font-size:20px;font-weight:700;color:#fff}
.auth-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:8px}
.auth-sub{color:#888;margin-bottom:32px;font-size:14px}
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;color:#aaa;margin-bottom:8px;font-weight:500}
.field input{width:100%;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;padding:12px 16px;color:#fff;font-size:15px;outline:none;transition:border-color .2s}
.field input:focus{border-color:#6c63ff}
.btn-primary{width:100%;background:linear-gradient(135deg,#6c63ff,#a855f7);color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.auth-error{background:#2a1a1a;border:1px solid #ff4444;border-radius:8px;padding:12px 16px;color:#ff8888;font-size:14px;margin-bottom:16px;display:none}

/* ── Layout ── */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:#1a1a2e;border-right:1px solid #2a2a4a;padding:24px 0;display:flex;flex-direction:column}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 20px 24px;border-bottom:1px solid #2a2a4a;margin-bottom:16px}
.sidebar-logo img{width:32px}
.sidebar-logo span{font-weight:700;font-size:16px;color:#fff}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:14px;color:#aaa;cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.nav-item:hover{color:#fff;background:rgba(108,99,255,.1)}
.nav-item.active{color:#a78bfa;background:rgba(108,99,255,.15);border-left-color:#6c63ff}
.nav-icon{font-size:16px;width:20px;text-align:center}
.sidebar-bottom{margin-top:auto;padding:16px 20px;border-top:1px solid #2a2a4a}
.btn-logout{width:100%;background:#2a1a1a;border:1px solid #3a2a2a;color:#ff8888;border-radius:8px;padding:10px;font-size:13px;cursor:pointer;transition:all .2s}
.btn-logout:hover{background:#3a1a1a}
.main{margin-left:240px;padding:32px;min-height:100vh}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:20px 24px}
.stat-label{font-size:12px;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.stat-num{font-size:28px;font-weight:700;color:#fff}
.stat-num.new{color:#a78bfa}
.stat-num.read{color:#60a5fa}
.stat-num.replied{color:#34d399}
.stat-num.archived{color:#888}

/* ── Toolbar ── */
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:24px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:10px 16px 10px 38px;color:#fff;font-size:14px;outline:none}
.search-wrap input:focus{border-color:#6c63ff}
.search-wrap::before{content:"🔍";position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.filter-tabs{display:flex;gap:4px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:4px}
.tab{padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;color:#888;transition:all .2s;border:none;background:none}
.tab.active{background:#6c63ff;color:#fff}
.tab:hover:not(.active){color:#fff}

/* ── Table ── */
.table-wrap{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:14px 16px;text-align:left;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #2a2a4a;font-weight:500}
td{padding:14px 16px;border-bottom:1px solid #1e1e35;font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(108,99,255,.05);cursor:pointer}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge.new{background:rgba(167,139,250,.15);color:#a78bfa}
.badge.read{background:rgba(96,165,250,.15);color:#60a5fa}
.badge.replied{background:rgba(52,211,153,.15);color:#34d399}
.badge.archived{background:rgba(107,114,128,.15);color:#9ca3af}
.td-name{font-weight:600;color:#fff}
.td-email{color:#888;font-size:13px}
.empty{text-align:center;padding:48px;color:#666}

/* ── Pagination ── */
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:20px}
.page-info{font-size:13px;color:#888}
.page-btns{display:flex;gap:8px}
.page-btn{background:#1a1a2e;border:1px solid #2a2a4a;color:#aaa;border-radius:6px;padding:7px 14px;font-size:13px;cursor:pointer;transition:all .2s}
.page-btn:hover:not(:disabled){border-color:#6c63ff;color:#fff}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Detail Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end;padding:0}
.detail-panel{background:#1a1a2e;border-left:1px solid #2a2a4a;width:500px;max-width:100vw;height:100vh;overflow-y:auto;padding:32px;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.panel-title{font-size:18px;font-weight:700;color:#fff}
.btn-close{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:4px}
.btn-close:hover{color:#fff}
.info-row{display:flex;gap:8px;margin-bottom:12px;font-size:14px}
.info-label{color:#888;min-width:80px;flex-shrink:0}
.info-val{color:#fff;word-break:break-all}
.msg-box{background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;padding:16px;font-size:14px;line-height:1.6;color:#ddd;white-space:pre-wrap;margin:16px 0}
.panel-actions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.btn-status{padding:8px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .2s}
.btn-status.new{background:rgba(167,139,250,.15);border-color:#a78bfa;color:#a78bfa}
.btn-status.read{background:rgba(96,165,250,.15);border-color:#60a5fa;color:#60a5fa}
.btn-status.replied{background:rgba(52,211,153,.15);border-color:#34d399;color:#34d399}
.btn-status.archived{background:rgba(107,114,128,.15);border-color:#9ca3af;color:#9ca3af}
.btn-delete{padding:8px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;background:rgba(239,68,68,.15);border:1px solid #ef4444;color:#ef4444;margin-left:auto;transition:all .2s}
.btn-delete:hover{background:rgba(239,68,68,.3)}
.notes-label{font-size:13px;color:#888;margin-bottom:8px}
.notes-area{width:100%;background:#0f0f1a;border:1px solid #2a2a4a;border-radius:8px;padding:12px;color:#fff;font-size:14px;resize:vertical;min-height:80px;outline:none;font-family:inherit}
.notes-area:focus{border-color:#6c63ff}
.btn-save-notes{margin-top:8px;background:#6c63ff;color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;transition:opacity .2s}
.btn-save-notes:hover{opacity:.85}
.divider{border:none;border-top:1px solid #2a2a4a;margin:20px 0}
.loading{text-align:center;padding:48px;color:#666}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #2a2a4a;border-top-color:#6c63ff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.page-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:24px}
</style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <img src="/img/own/logo.svg" alt="GBWC">
      <span>GBWC Admin</span>
    </div>
    <div class="auth-title">Вход в панель</div>
    <div class="auth-sub">Global Businesswomen Council</div>
    <div class="auth-error" id="auth-error"></div>
    <div class="field">
      <label>Логин</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn">Войти</button>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="/img/own/logo.svg" alt="GBWC">
      <span>GBWC Admin</span>
    </div>
    <div class="nav-item active" data-page="submissions">
      <span class="nav-icon">📬</span> Заявки
    </div>
    <div class="sidebar-bottom">
      <button class="btn-logout" id="logout-btn">Выйти</button>
    </div>
  </aside>

  <main class="main">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Новые</div>
        <div class="stat-num new" id="count-new">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Прочитанные</div>
        <div class="stat-num read" id="count-read">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Отвечено</div>
        <div class="stat-num replied" id="count-replied">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Архив</div>
        <div class="stat-num archived" id="count-archived">—</div>
      </div>
    </div>

    <div class="page-title">Заявки и обращения</div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Поиск по имени, email, сообщению...">
      </div>
      <div class="filter-tabs">
        <button class="tab active" data-status="">Все</button>
        <button class="tab" data-status="new">Новые</button>
        <button class="tab" data-status="read">Прочитанные</button>
        <button class="tab" data-status="replied">Отвечено</button>
        <button class="tab" data-status="archived">Архив</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Отправитель</th>
            <th>Тема</th>
            <th>Статус</th>
            <th>Дата</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="4" class="loading"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <div class="page-info" id="page-info"></div>
      <div class="page-btns">
        <button class="page-btn" id="prev-btn" disabled>← Назад</button>
        <button class="page-btn" id="next-btn" disabled>Вперёд →</button>
      </div>
    </div>
  </main>
</div>

<!-- ── Detail Panel ── -->
<div class="modal-overlay" id="detail-overlay" style="display:none" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel">
    <div class="panel-header">
      <div class="panel-title">Заявка</div>
      <button class="btn-close" onclick="closeDetailPanel()">✕</button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<script>
const API = window.location.hostname === "localhost" ? "http://localhost:3001" : "";
let token = localStorage.getItem("gbwc_admin_token");
let currentPage = 1, currentStatus = "", currentSearch = "", searchTimer;
let totalPages = 1;

// ── Auth ──────────────────────────────────────────────
async function doLogin() {
  const btn = document.getElementById("login-btn");
  const err = document.getElementById("auth-error");
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  if (!username || !password) { showErr("Заполните все поля"); return; }
  btn.disabled = true; btn.textContent = "Входим...";
  try {
    const r = await fetch(`${API}/api/admin/login`, {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (!d.ok) { showErr(d.error); btn.disabled=false; btn.textContent="Войти"; return; }
    token = d.token;
    localStorage.setItem("gbwc_admin_token", token);
    showApp();
  } catch(e) { showErr("Ошибка сети"); btn.disabled=false; btn.textContent="Войти"; }
}
function showErr(msg) {
  const e = document.getElementById("auth-error");
  e.textContent = msg; e.style.display = "block";
}

function showApp() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadSubmissions();
}

function logout() {
  localStorage.removeItem("gbwc_admin_token");
  token = null;
  document.getElementById("app").style.display = "none";
  document.getElementById("auth-screen").style.display = "flex";
}

// ── Загрузка заявок ───────────────────────────────────
async function loadSubmissions() {
  document.getElementById("table-body").innerHTML =
    `<tr><td colspan="4" class="loading"><div class="spinner"></div></td></tr>`;
  const params = new URLSearchParams({ page: currentPage, limit: 20 });
  if (currentStatus) params.set("status", currentStatus);
  if (currentSearch) params.set("search", currentSearch);
  try {
    const r = await fetch(`${API}/api/admin/submissions?${params}`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    if (r.status === 401) { logout(); return; }
    const d = await r.json();
    if (!d.ok) return;
    renderTable(d.items);
    renderPagination(d.total, d.page, d.pages);
    renderStats(d.statusCounts);
    totalPages = d.pages;
  } catch(e) {
    document.getElementById("table-body").innerHTML =
      `<tr><td colspan="4" class="empty">Ошибка загрузки</td></tr>`;
  }
}

function renderStats(c) {
  document.getElementById("count-new").textContent     = c.new || 0;
  document.getElementById("count-read").textContent    = c.read || 0;
  document.getElementById("count-replied").textContent = c.replied || 0;
  document.getElementById("count-archived").textContent= c.archived || 0;
}

function renderTable(items) {
  if (!items.length) {
    document.getElementById("table-body").innerHTML =
      `<tr><td colspan="4" class="empty">Нет заявок</td></tr>`;
    return;
  }
  document.getElementById("table-body").innerHTML = items.map(item => `
    <tr onclick="openDetail('${item._id}')">
      <td>
        <div class="td-name">${esc(item.name)} ${item.company ? `<span style="color:#888;font-weight:400">· ${esc(item.company)}</span>` : ""}</div>
        <div class="td-email">${esc(item.email)}</div>
      </td>
      <td>${esc(item.topic)}</td>
      <td><span class="badge ${item.status}">${statusLabel(item.status)}</span></td>
      <td style="color:#888;font-size:13px">${formatDate(item.createdAt)}</td>
    </tr>
  `).join("");
}

function renderPagination(total, page, pages) {
  document.getElementById("page-info").textContent = `Всего: ${total} | Страница ${page} из ${pages||1}`;
  document.getElementById("prev-btn").disabled = page <= 1;
  document.getElementById("next-btn").disabled = page >= pages;
}

// ── Detail Panel ──────────────────────────────────────
async function openDetail(id) {
  document.getElementById("detail-overlay").style.display = "flex";
  document.getElementById("detail-content").innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
  try {
    const r = await fetch(`${API}/api/admin/submissions/${id}`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const d = await r.json();
    if (!d.ok) return;
    const item = d.item;
    document.getElementById("detail-content").innerHTML = `
      <div class="panel-actions">
        <button class="btn-status new"      onclick="setStatus('${id}','new')">Новое</button>
        <button class="btn-status read"     onclick="setStatus('${id}','read')">Прочитано</button>
        <button class="btn-status replied"  onclick="setStatus('${id}','replied')">Отвечено</button>
        <button class="btn-status archived" onclick="setStatus('${id}','archived')">Архив</button>
        <button class="btn-delete"          onclick="deleteItem('${id}')">🗑 Удалить</button>
      </div>
      <div style="margin-bottom:4px"><span class="badge ${item.status}">${statusLabel(item.status)}</span></div>
      <hr class="divider">
      <div class="info-row"><span class="info-label">Имя:</span><span class="info-val">${esc(item.name)}</span></div>
      <div class="info-row"><span class="info-label">Компания:</span><span class="info-val">${esc(item.company||"—")}</span></div>
      <div class="info-row"><span class="info-label">Email:</span><span class="info-val"><a href="mailto:${esc(item.email)}" style="color:#a78bfa">${esc(item.email)}</a></span></div>
      <div class="info-row"><span class="info-label">Тема:</span><span class="info-val">${esc(item.topic)}</span></div>
      <div class="info-row"><span class="info-label">Язык:</span><span class="info-val">${item.lang||"ru"}</span></div>
      <div class="info-row"><span class="info-label">Дата:</span><span class="info-val">${formatDate(item.createdAt)}</span></div>
      <div class="info-row"><span class="info-label">IP:</span><span class="info-val" style="color:#888;font-size:12px">${esc(item.ip||"—")}</span></div>
      <hr class="divider">
      <div style="font-size:13px;color:#888;margin-bottom:8px">Сообщение:</div>
      <div class="msg-box">${esc(item.message)}</div>
      <hr class="divider">
      <div class="notes-label">Заметки (видны только вам):</div>
      <textarea class="notes-area" id="notes-area">${esc(item.notes||"")}</textarea>
      <button class="btn-save-notes" onclick="saveNotes('${id}')">Сохранить заметку</button>
    `;
    // Подсвечиваем текущий статус
    document.querySelectorAll(".btn-status").forEach(b => {
      if (b.classList.contains(item.status)) b.style.opacity = "1";
      else b.style.opacity = "0.5";
    });
  } catch(e) {
    document.getElementById("detail-content").innerHTML = "<p style='color:#888'>Ошибка загрузки</p>";
  }
}

async function setStatus(id, status) {
  await fetch(`${API}/api/admin/submissions/${id}`, {
    method: "PATCH",
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ status })
  });
  closeDetailPanel();
  loadSubmissions();
}

async function saveNotes(id) {
  const notes = document.getElementById("notes-area").value;
  await fetch(`${API}/api/admin/submissions/${id}`, {
    method: "PATCH",
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify({ notes })
  });
  const btn = document.querySelector(".btn-save-notes");
  if (btn) { btn.textContent = "✓ Сохранено"; setTimeout(()=>btn.textContent="Сохранить заметку",2000); }
}

async function deleteItem(id) {
  if (!confirm("Удалить заявку? Это действие необратимо.")) return;
  await fetch(`${API}/api/admin/submissions/${id}`, {
    method: "DELETE",
    headers: { "Authorization": `Bearer ${token}` }
  });
  closeDetailPanel();
  loadSubmissions();
}

function closeDetail(e) { if (e.target === document.getElementById("detail-overlay")) closeDetailPanel(); }
function closeDetailPanel() { document.getElementById("detail-overlay").style.display = "none"; }

// ── Helpers ───────────────────────────────────────────
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function statusLabel(s) { return {new:"Новое",read:"Прочитано",replied:"Отвечено",archived:"Архив"}[s]||s; }
function formatDate(d) {
  return new Date(d).toLocaleString("ru-RU",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

// ── Events ────────────────────────────────────────────
document.getElementById("login-btn").addEventListener("click", doLogin);
document.getElementById("password").addEventListener("keydown", e => { if(e.key==="Enter") doLogin(); });
document.getElementById("logout-btn").addEventListener("click", logout);

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    currentStatus = tab.dataset.status;
    currentPage = 1;
    loadSubmissions();
  });
});

document.getElementById("search-input").addEventListener("input", e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value.trim();
    currentPage = 1;
    loadSubmissions();
  }, 400);
});

document.getElementById("prev-btn").addEventListener("click", () => {
  if (currentPage > 1) { currentPage--; loadSubmissions(); }
});
document.getElementById("next-btn").addEventListener("click", () => {
  if (currentPage < totalPages) { currentPage++; loadSubmissions(); }
});

if (token) showApp();
